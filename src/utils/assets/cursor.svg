<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40' viewBox='0 0 40 40'>
  <!-- Axon lines (dendrites) -->
  <line x1='20' y1='20' x2='38' y2='8'  stroke='#00D9FF' stroke-width='1.2' stroke-linecap='round' opacity='0.7'/>
  <line x1='20' y1='20' x2='36' y2='30' stroke='#00D9FF' stroke-width='1.2' stroke-linecap='round' opacity='0.7'/>
  <line x1='20' y1='20' x2='20' y2='38' stroke='#00D9FF' stroke-width='1.2' stroke-linecap='round' opacity='0.6'/>
  <line x1='20' y1='20' x2='4'  y2='30' stroke='#7C3AED' stroke-width='1.2' stroke-linecap='round' opacity='0.6'/>
  <line x1='20' y1='20' x2='6'  y2='10' stroke='#7C3AED' stroke-width='1.2' stroke-linecap='round' opacity='0.6'/>
  <line x1='20' y1='20' x2='20' y2='3'  stroke='#00D9FF' stroke-width='1.2' stroke-linecap='round' opacity='0.5'/>
  <!-- Synapse dots at tips -->
  <circle cx='38' cy='8'  r='2' fill='#00D9FF' opacity='0.9'/>
  <circle cx='36' cy='30' r='2' fill='#00D9FF' opacity='0.9'/>
  <circle cx='20' cy='38' r='1.8' fill='#00D9FF' opacity='0.8'/>
  <circle cx='4'  cy='30' r='2' fill='#7C3AED' opacity='0.9'/>
  <circle cx='6'  cy='10' r='2' fill='#7C3AED' opacity='0.9'/>
  <circle cx='20' cy='3'  r='1.8' fill='#00D9FF' opacity='0.8'/>
  <!-- Cell body glow -->
  <circle cx='20' cy='20' r='8' fill='#001a2e' stroke='#00D9FF' stroke-width='1.5' opacity='0.95'/>
  <!-- Cell body inner -->
  <circle cx='20' cy='20' r='4.5' fill='#00D9FF' opacity='0.9'/>
  <circle cx='20' cy='20' r='2' fill='white' opacity='0.6'/>
</svg>
