<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1330 640" width="1330" height="640" font-family="'Segoe UI', 'Inter', system-ui, sans-serif">
  <defs>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b"/><stop offset="1" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#131317"/><stop offset="1" stop-color="#0d0d0f"/>
    </linearGradient>
    <marker id="aAmber" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#f59e0b"/></marker>
    <marker id="aBlue"  markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#60a5fa"/></marker>
    <marker id="aPurp"  markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#a78bfa"/></marker>
    <marker id="aRose"  markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#fb7185"/></marker>
    <marker id="aSky"   markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#38bdf8"/></marker>
    <marker id="aCyan"  markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#22d3ee"/></marker>

    <style>
      .box  { fill:#17171c; stroke:rgba(255,255,255,0.10); stroke-width:1.2; }
      .lbl  { fill:#f2f2f4; font-size:18px; font-weight:600; }
      .sub  { fill:#a2a2ac; font-size:13.5px; }
      .llm  { fill:#fbbf24; font-size:13.5px; font-weight:600; }
      .ico  { font-size:25px; }
      .link { fill:none; stroke:#4a4a56; stroke-width:2.4; }
      .title{ fill:#f2f2f4; font-size:27px; font-weight:700; }
      .cap  { fill:#a2a2ac; font-size:14px; }
      .cap2 { fill:#bcbcc6; font-size:13.5px; }
      .foot { fill:#82828c; font-size:12.5px; }
      .ingtag{ fill:#38bdf8; font-size:13px; font-weight:700; letter-spacing:.4px; }
      .brtag{ font-size:14px; font-weight:700; letter-spacing:.5px; }

      .flow { fill:none; stroke-width:2.6; stroke-linecap:round;
              stroke-dasharray:2 12; animation:march .9s linear infinite; }
      @keyframes march { to { stroke-dashoffset:-14; } }
      .tok  { fill:#22c55e; opacity:0; animation:emit 8s linear infinite; }
      @keyframes emit { 0%,60%{opacity:0;transform:translateX(0)}64%{opacity:1;transform:translateX(0)}100%{opacity:0;transform:translateX(46px)} }
      @media (prefers-reduced-motion: reduce){ .flow,.tok{animation:none} }
    </style>
  </defs>

  <rect x="1" y="1" width="1328" height="638" rx="20" fill="url(#panel)" stroke="rgba(255,255,255,0.07)"/>

  <!-- header -->
  <text class="title" x="40" y="52">History RAG · <tspan fill="url(#amber)">Architecture</tspan></text>
  <text class="cap"  x="40" y="78">How your browsing history becomes a cited answer — every model runs locally on your machine.</text>
  <text class="cap2" x="40" y="100">🧠 The <tspan fill="#fbbf24" font-weight="700">LLM</tspan> (<tspan fill="#fbbf24" font-weight="700">qwen2.5:7b</tspan>, local via Ollama) reads chat memory and picks exactly <tspan fill="#fff" font-weight="700">ONE</tspan> path per query: <tspan fill="#fbbf24" font-weight="700">SEARCH</tspan> → retrieve → answer,  or  <tspan fill="#fbbf24" font-weight="700">ANSWER</tspan> → skip retrieval.</text>

  <!-- badge -->
  <g transform="translate(1100,26)">
    <rect width="200" height="34" rx="17" fill="rgba(34,197,94,0.10)" stroke="rgba(34,197,94,0.45)"/>
    <text x="18" y="22" font-size="16">🔒</text>
    <text x="46" y="22" fill="#22c55e" font-size="13.5" font-weight="700" letter-spacing=".5">100% LOCAL · NO CLOUD</text>
  </g>

  <!-- ══ INGESTION ══ -->
  <text class="ingtag" x="44" y="140">⟳ INGESTION · BACKGROUND SYNC — builds the search index ahead of time</text>
  <path class="link" d="M220,179 L280,179" marker-end="url(#aSky)"/>
  <path class="link" d="M460,179 L520,179" marker-end="url(#aSky)"/>
  <path class="link" d="M610,208 L688,232" marker-end="url(#aSky)"/>
  <path class="flow" style="stroke:#38bdf8" d="M220,179 L278,179"/>
  <path class="flow" style="stroke:#38bdf8" d="M460,179 L518,179"/>
  <path class="flow" style="stroke:#38bdf8" d="M610,208 L686,231"/>
  <text class="sub" x="702" y="214" fill="#5c7a8a" font-size="12.5">writes ChromaDB + BM25</text>

  <g transform="translate(40,150)">
    <rect class="box" width="180" height="58" rx="13"/>
    <text class="ico" x="15" y="39" font-size="22">🌐</text>
    <text class="lbl" x="48" y="27" font-size="15.5">Chrome History</text>
    <text class="sub" x="48" y="45" font-size="12">SQLite · extension</text>
  </g>
  <g transform="translate(280,150)">
    <rect class="box" width="180" height="58" rx="13"/>
    <text class="ico" x="15" y="39" font-size="22">🧹</text>
    <text class="lbl" x="48" y="27" font-size="15.5">Filter &amp; Clean</text>
    <text class="sub" x="48" y="45" font-size="12">drop noise · titles</text>
  </g>
  <g transform="translate(520,150)">
    <rect class="box" width="180" height="58" rx="13"/>
    <text class="ico" x="15" y="39" font-size="22">🔢</text>
    <text class="lbl" x="48" y="27" font-size="15.5">Embed &amp; Index</text>
    <text class="sub" x="48" y="45" font-size="12">vectors + BM25</text>
  </g>

  <!-- ══ QUERY — decision fork (top = SEARCH, bottom = ANSWER) ══ -->
  <path class="link" d="M230,340 L280,340" marker-end="url(#aAmber)"/>
  <path class="link" d="M480,340 L492,340"/>
  <path class="link" d="M518,316 L620,272" marker-end="url(#aBlue)"/>
  <path class="link" d="M518,364 L1100,364" marker-end="url(#aAmber)"/>
  <path class="link" d="M820,272 L870,272" marker-end="url(#aPurp)"/>
  <path class="link" d="M1070,272 L1100,320" marker-end="url(#aRose)"/>
  <path class="link" d="M325,452 L362,381" marker-end="url(#aCyan)"/>

  <path class="flow" style="stroke:#60a5fa" d="M518,316 L620,272"/>
  <path class="flow" style="stroke:#f59e0b" d="M518,364 L1100,364"/>
  <path class="flow" style="stroke:#a78bfa" d="M820,272 L870,272"/>
  <path class="flow" style="stroke:#fb7185" d="M1070,272 L1100,320"/>
  <path class="flow" style="stroke:#f59e0b" d="M230,340 L280,340"/>
  <path class="flow" style="stroke:#22d3ee" d="M325,452 L360,381"/>

  <!-- decision diamond -->
  <polygon points="518,316 544,340 518,364 492,340" fill="#1c1c22" stroke="#fbbf24" stroke-width="1.6"/>
  <text x="518" y="346" text-anchor="middle" fill="#fbbf24" font-size="18" font-weight="700">?</text>

  <!-- branch labels -->
  <text class="brtag" x="586" y="312" text-anchor="middle" fill="#60a5fa">SEARCH</text>
  <text class="brtag" x="800" y="384" text-anchor="middle" fill="#d98c1a">ANSWER · skip retrieval</text>

  <!-- ══ nodes ══ -->
  <g transform="translate(620,234)">
    <rect class="box" width="200" height="76" rx="15"/>
    <text class="ico" x="18" y="48">🧠</text>
    <text class="lbl" x="54" y="33">Hybrid Search</text>
    <text class="sub" x="54" y="55">dense + sparse + RRF</text>
  </g>
  <g transform="translate(870,234)">
    <rect class="box" width="200" height="76" rx="15"/>
    <text class="ico" x="18" y="48">🎯</text>
    <text class="lbl" x="54" y="33">Rerank</text>
    <text class="sub" x="54" y="55">cross-encoder · top 15</text>
  </g>

  <g transform="translate(30,302)">
    <rect class="box" width="200" height="76" rx="15"/>
    <text class="ico" x="18" y="48">💬</text>
    <text class="lbl" x="54" y="34">User Query</text>
    <text class="sub" x="54" y="56">plain English</text>
  </g>
  <g transform="translate(280,302)">
    <rect class="box" width="200" height="76" rx="15"/>
    <text class="ico" x="18" y="48">🧭</text>
    <text class="lbl" x="54" y="33">LLM</text>
    <text class="llm" x="54" y="55">qwen2.5:7b · decides</text>
  </g>
  <g transform="translate(1100,302)">
    <rect class="box" width="200" height="76" rx="15"/>
    <text class="ico" x="18" y="48">✨</text>
    <text class="lbl" x="54" y="34">Generate</text>
    <text class="sub" x="54" y="56">streams to Chat UI</text>
  </g>

  <!-- Chat Memory (wider box to fit text) -->
  <g transform="translate(190,452)">
    <rect class="box" width="230" height="64" rx="15" style="fill:#101a1d; stroke:rgba(34,211,238,0.35)"/>
    <text class="ico" x="18" y="42" font-size="23">💭</text>
    <text class="lbl" x="52" y="30" font-size="16.5">Chat Memory</text>
    <text class="sub" x="52" y="48" font-size="12.5">read by the LLM to decide</text>
  </g>

  <!-- streamed tokens -->
  <circle class="tok" cx="1308" cy="336" r="3.2" style="animation-delay:0s"/>
  <circle class="tok" cx="1308" cy="340" r="3.2" style="animation-delay:0.12s"/>
  <circle class="tok" cx="1308" cy="344" r="3.2" style="animation-delay:0.24s"/>
  <circle class="tok" cx="1308" cy="338" r="3.2" style="animation-delay:0.36s"/>
  <circle class="tok" cx="1308" cy="342" r="3.2" style="animation-delay:0.48s"/>

  <text class="foot" x="40" y="612">one action per query — SEARCH: retrieve → rerank → answer with sources     |     ANSWER: skip retrieval, reply from chat memory     ·     nothing leaves your machine</text>
</svg>
